{% extends "base.html" %}
{% block title %}Editar Usuario{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body">
        <h2 class="text-warning mb-4">Editar Usuario</h2>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control"
                       value="{{ usuario.nombre }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       value="{{ usuario.email }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Rol</label>
                <select name="rol" class="form-select">
                    <option value="usuario" {% if usuario.rol=='usuario' %}selected{% endif %}>Usuario</option>
                    <option value="admin" {% if usuario.rol=='admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>

            <button class="btn btn-warning">Actualizar</button>
            <a href="{{ url_for('usuarios.listar_usuarios') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
